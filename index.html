<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
 <title>iPad Drive Slideshow</title>
 <style>
    :root { --bg: #000; --panel: rgba(0, 0, 0, 0.65); --text: #fff; --muted: #aaa; --button: #2563eb; --button2: #333; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; touch-action: manipulation; }
    #app { width: 100vw; height: 100vh; position: relative; background: #000; }
    
    .slide {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: contain;
      background: #000;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      pointer-events: none;
    }
    .slide.active { opacity: 1; }



    #topPanel { position: absolute; top: env(safe-area-inset-top, 0); left: 0; right: 0; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0)); z-index: 10; }
    button, select { font-size: 14px; border: none; border-radius: 10px; padding: 10px 12px; color: #fff; background: var(--button2); }
    button.primary { background: var(--button); }
    button:disabled { opacity: 0.4; }
    #status { font-size: 13px; color: var(--muted); padding: 6px 8px; background: var(--panel); border-radius: 8px; max-width: 90vw; }
    #bottomPanel { position: absolute; left: 0; right: 0; bottom: env(safe-area-inset-bottom, 0); padding: 12px; display: flex; gap: 8px; align-items: center; justify-content: center; background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0)); z-index: 10; }
    #info { position: absolute; right: 12px; bottom: calc(70px + env(safe-area-inset-bottom, 0)); padding: 8px 10px; background: var(--panel); color: #fff; border-radius: 10px; font-size: 12px; z-index: 10; }
    .hidden { display: none !important; }
    #emptyMessage { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; padding: 24px; color: #ccc; z-index: 5; }
    .ui-hidden #topPanel, .ui-hidden #bottomPanel, .ui-hidden #info { display: none !important; }
 </style>
</head>
<body>
 <div id="app">
    <img id="slide1" class="slide" alt="slide" />
    <img id="slide2" class="slide" alt="slide" />
    <div id="emptyMessage">
      <div><h1>Drive Slideshow</h1><p>まず「Google Driveに接続」し、<br>「写真を読み込む」を押してください。</p></div>
    </div>
    <div id="topPanel">
      <button id="authorizeButton" class="primary">Google Driveに接続</button>
      <button id="loadButton" disabled>写真を読み込む</button>
      <button id="fullscreenButton">全画面表示</button>
      <select id="intervalSelect"><option value="5000">5秒</option><option value="10000" selected>10秒</option><option value="30000">30秒</option></select>
      <select id="fitSelect"><option value="contain" selected>全体表示</option><option value="cover">画面いっぱい</option></select>
      <div id="status">未接続</div>
    </div>
    <div id="info" class="hidden"></div>
    <div id="bottomPanel">
      <button id="prevButton" disabled>前へ</button>
      <button id="pauseButton" disabled>一時停止</button>
      <button id="nextButton" disabled>次へ</button>
    </div>
 </div>



 <script src="https://accounts.google.com/gsi/client" async defer></script>
 <script>
    const CLIENT_ID = "513616389762-7qkh3fq0jbinv5mcg8s8e6bdn2d8m200.apps.googleusercontent.com";
    const FOLDER_ID = "13Eq_PBE-DukwyniJi-p-S0Cupttv3KBV";
    const SCOPES = "https://www.googleapis.com/auth/drive.readonly";
    const FOLDER_MIME_TYPE = "application/vnd.google-apps.folder";



    let tokenClient, accessToken = null, photos = [], currentIndex = 0, timer = null, paused = false, activeSlideIndex = 0;
    const slides = [document.getElementById("slide1"), document.getElementById("slide2")];



    // 読み込み・エラー処理付きの画像取得
    async function showCurrentPhoto() {
      if (photos.length === 0) return;
      const file = photos[currentIndex];
      setStatus(`読み込み中: ${file.name}...`);
      
      try {
        const blob = await fetchImageBlob(file.id);
        const url = URL.createObjectURL(blob);
        const nextSlide = slides[(activeSlideIndex + 1) % 2];
        const currentSlide = slides[activeSlideIndex];



        nextSlide.src = url;
        nextSlide.style.objectFit = document.getElementById("fitSelect").value;
        
        nextSlide.onload = () => {
          nextSlide.classList.add("active");
          currentSlide.classList.remove("active");
          if (currentSlide.src) URL.revokeObjectURL(currentSlide.src);
          activeSlideIndex = (activeSlideIndex + 1) % 2;
          document.getElementById("info").textContent = `${currentIndex + 1}/${photos.length} ${file.name}`;
          setStatus(`表示中: ${file.name}`);
        };
      } catch (e) {
        setStatus("画像の読み込みに失敗しました");
        console.error(e);
      }
    }



    async function fetchImageBlob(fileId) {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
      if (!res.ok) throw new Error("APIエラー: " + res.status);
      return await res.blob();
    }



    async function listImagesRecursively(folderId) {
      setStatus("フォルダを検索中...");
      try {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&fields=files(id,name,mimeType)`, { headers: { Authorization: `Bearer ${accessToken}` } });
        const data = await res.json();
        const images = (data.files || []).filter(f => f.mimeType.startsWith("image/"));
        if (images.length === 0) throw new Error("画像が見つかりませんでした");
        return images;
      } catch (e) {
        setStatus(e.message);
        return [];
      }
    }



    // 認証・イベント設定
    window.onload = () => {
      const check = setInterval(() => {
        if (window.google) {
          clearInterval(check);
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { accessToken = res.access_token; setStatus("接続完了"); document.getElementById("loadButton").disabled = false; }
          });
        }
      }, 500);
    };



    document.getElementById("loadButton").onclick = async () => {
      photos = await listImagesRecursively(FOLDER_ID);
      if (photos.length > 0) {
        document.getElementById("emptyMessage").classList.add("hidden");
        document.getElementById("info").classList.remove("hidden");
        showCurrentPhoto();
      }
    };
    
    function setStatus(m) { document.getElementById("status").textContent = m; }
 </script>
</body>
</html>
